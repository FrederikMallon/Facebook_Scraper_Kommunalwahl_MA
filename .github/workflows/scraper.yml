name: Facebook Scraper Wöchentlich

on:
  schedule:
    # Läuft jeden Montag um 8:00 UTC
    - cron: '0 8 * * 1'
  workflow_dispatch: # Ermöglicht manuelles Auslösen

jobs:
  scrape:
    runs-on: ubuntu-latest
    
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
      
      - name: Setup R
        uses: r-lib/actions/setup-r@v2
        with:
          r-version: '4.3.2'
          use-public-rspm: true
      
      - name: Cache R packages
        uses: actions/cache@v3
        with:
          path: ${{ env.R_LIBS_USER }}
          key: ${{ runner.os }}-r-4.3.2-pkgs-v2
          restore-keys: ${{ runner.os }}-r-4.3.2-
      
      - name: Install System Dependencies
        run: |
          sudo apt-get update -qq
          sudo apt-get install -y --no-install-recommends \
            libcurl4-openssl-dev \
            libssl-dev \
            libxml2-dev \
            libfontconfig1-dev \
            libharfbuzz-dev \
            libfribidi-dev
      
      - name: Install R Packages
        env:
          GITHUB_PAT: ${{ secrets.GITHUB_TOKEN }}
        run: |
          options(repos = c(RSPM = "https://packagemanager.posit.co/cran/__linux__/noble/latest"))
          
          # Prüfe ob Pakete bereits installiert sind
          required_pkgs <- c("tidyverse", "lubridate", "scales", "remotes")
          
          new_pkgs <- required_pkgs[!(required_pkgs %in% installed.packages()[,"Package"])]
          if(length(new_pkgs)) install.packages(new_pkgs)
          
          # metatargetr von GitHub mit Token
          if(!"metatargetr" %in% installed.packages()[,"Package"]) {
            remotes::install_github("favstats/metatargetr", auth_token = Sys.getenv("GITHUB_PAT"))
          }
        shell: Rscript {0}
      
      - name: Run Scraper
        run: Rscript facebook_scraper.R
      
      - name: Commit and Push Results
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add results/
          git diff --quiet && git diff --staged --quiet || git commit -m "Update Facebook Likes - $(date +'%Y-%m-%d')"
          git push
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
